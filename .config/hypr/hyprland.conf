# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/Configuring-Hyprland/

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
source = ~/.config/hypr/colors.conf # override with colors from wallust
source = ~/.config/hypr/env.conf
source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/devices.conf
source = ~/.config/hypr/keybinds.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=DP-3,3440x1440@99.99Hz,auto,1


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 10
    gaps_out = 20

    border_size = 2

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = master
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2.0

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.9
    fullscreen_opacity = 1.0

    # shadow {
    #     enabled = true
    #     range = 4
    #     render_power = 3
    # }

    dim_inactive = true
    dim_strength = 0.2

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 5
        passes = 2

        vibrancy = 0.282
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = true

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/ for more
    bezier = spring, 0.12, 0.88, 0.24, 1.12

    animation = windows, 1, 2, spring
    animation = windowsOut, 1, 2, default, popin 80%
    animation = border, 1, 8, default
    animation = borderangle, 1, 6, default
    animation = fade, 1, 4, default
    animation = workspaces, 1, 2, default
    animation = specialWorkspace, 1, 2, default, fade
}

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = slave
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat

    repeat_delay = 200
    repeat_rate = 60

    touchpad {
        natural_scroll = false
    }
}

cursor {
    no_hardware_cursors = true
}


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float on, match:class ^(kitty)$
# windowrule = float on, match:class ^(kitty)$, match:title ^(kitty)$

windowrule = border_size 0, match:float 1
windowrule = float on, match:class ^(1Password)$
windowrule = float on, match:class ^(Tandem)$
windowrule = float on, match:class ^(Rofi|rofi)$
windowrule = float on, match:class ^(Volume Control)$
windowrule = float on, match:class ^(kitty-float)$
windowrule = stay_focused on, match:class ^(Rofi|rofi)$
windowrule = suppress_event maximize, match:class .* # You'll probably like this.

