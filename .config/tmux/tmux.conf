set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",*:RGB"

set -g allow-passthrough on

# set -sg repeat-time 500
set -sg escape-time 0
set -s focus-events on

set -g prefix2 C-Space
bind C-Space send-prefix -2

# easy config reload
bind-key R source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

set -q -g status-utf8 on
setw -q -g utf8 on

set -g history-limit 5000

set -g mouse on
set -g set-clipboard on

set -g detach-on-destroy off

set -g extended-keys on
set -g extended-keys-format csi-u

# -- vi mode --
setw -g mode-keys vi
bind-key j select-pane -D
bind-key k select-pane -U
bind-key h select-pane -L
bind-key l select-pane -R
bind-key v copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# -- additional keybinds --
unbind-key t
bind-key t display-popup -B -E -w 60% -h 60% ~/.config/scripts/tmux-sessionizer.sh

# -- pane navigation --
bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iqE 'vim|nvim' || ps -o comm= -t '#{pane_tty}' | grep -iq fzf) && tmux send-keys C-j || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iqE 'vim|nvim' || ps -o comm= -t '#{pane_tty}' | grep -iq fzf) && tmux send-keys C-k || tmux select-pane -U"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-l) || tmux select-pane -R"
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

# -- display --
set -g base-index 1
set -g pane-base-index 1

set -g automatic-rename on
set -g renumber-windows on

set -g set-titles on
set -g visual-activity on
set -g visual-bell off
set -g visual-silence off
set -g bell-action none

setw -g monitor-activity off

set -g status-interval 30
# set -g status-left ""
set -g status-justify left
set -g status-left "#[fg=colour7] ⚡ #[fg=colour8]░▓#[fg=colour7,bg=colour8,bold]#S#[fg=colour8,bg=default,nobold]▓░ "
set -g status-right "#[fg=colour8,bold] %a %m/%d/%Y  %l:%M %p "
set -g status-left-length 200
set -g status-right-length 200
set -g status-position top
set -g status-style "fg=colour7,bg=colour0"

setw -g window-status-current-format "#[fg=magenta] ❯ #[bold]#I#[nobold] #W#{?window_zoomed_flag,(),} "
setw -g window-status-format "#[fg=colour8] #I #W "
setw -g window-status-activity-style "fg=magenta,bg=default"
setw -g window-status-current-style default

set -g pane-active-border-style "fg=magenta"
set -g pane-border-style "fg=colour8"
set -g pane-border-indicators both

# -- theme (tmux 3.6+ auto light/dark) --
# Maps the built-in theme slots to Rose Pine so default-styled UI
# (mode/menu/message bars, popups, display-panes) matches the terminal.
set -s theme dark
# Rose Pine (dark)
set -s dark-theme-black      "#191724"
set -s dark-theme-white      "#e0def4"
set -s dark-theme-dark-grey  "#403d52"
set -s dark-theme-light-grey "#6e6a86"
set -s dark-theme-red        "#eb6f92"
set -s dark-theme-green      "#31748f"
set -s dark-theme-yellow     "#f6c177"
set -s dark-theme-blue       "#9ccfd8"
set -s dark-theme-cyan       "#ebbcba"
set -s dark-theme-magenta    "#c4a7e7"
# Rose Pine Dawn (light)
set -s light-theme-black      "#575279"
set -s light-theme-white      "#faf4ed"
set -s light-theme-dark-grey  "#9893a5"
set -s light-theme-light-grey "#cecacd"
set -s light-theme-red        "#b4637a"
set -s light-theme-green      "#286983"
set -s light-theme-yellow     "#ea9d34"
set -s light-theme-blue       "#56949f"
set -s light-theme-cyan       "#d7827e"
set -s light-theme-magenta    "#907aa9"

set -g default-terminal "${TERM}"

set -g @tmux-nerd-font-window-name-shell-icon ''
set -g @tmux-nerd-font-window-name-show-name false

set -g @thumbs-key F

# -- tpm --
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'

set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'fcsonline/tmux-thumbs'

run '~/.config/tmux/plugins/tpm/tpm'
